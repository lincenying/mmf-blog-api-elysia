# 测试环境配置（与 development 共用本地 MongoDB）
server:
  nodeEnv: test
  port: 4000
  host: 0.0.0.0

cors:
  origin: 'http://localhost:4000'
  credentials: true
  methods: 'GET,POST,PUT,DELETE,OPTIONS'

log:
  level: error

static:
  assetsPath: ./public
  prefix: /static

md5_salt: '!@#$%(*&^)'

db:
  mongo_uri: mongodb://127.0.0.1:27017
  mongo_db: mmfblog_v2
