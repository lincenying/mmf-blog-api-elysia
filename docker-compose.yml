services:

  api_bun:
    container_name: api-bun-server
    image: lincenying/bun-api-server:${TAG}
    build:
      context: .
      dockerfile: ./Dockerfile
    environment:
      DATABASE_URL: mongodb://api_mongo:27017
    env_file:
      - .env
    ports:
      - 14080:14080
    depends_on:
      - api_mongo
    networks:
      - webnet

  api_mongo:
    container_name: api-bun-mongo-server
    image: mongo:7
    volumes:
      - ${MONGODB_DIR:-/data/db}:/data/db
    ports:
      - 27017:27017
    networks:
      - webnet

networks:
  webnet:
    driver: bridge
